<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SG MÓVIL - Acceso Administrativo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: #07090e; overflow-x: hidden; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .login-gradient { background: radial-gradient(circle at center, #1e293b 0%, #07090e 100%); }
        .btn-glow:hover { box-shadow: 0 0 20px rgba(59, 130, 246, 0.5); transform: translateY(-2px); }
        /* Animación de entrada */
        .fade-in { animation: fadeIn 0.8s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .custom-scrollbar::-webkit-scrollbar { width: 5px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #3b82f6; border-radius: 10px; }
    </style>
</head>
<body class="text-white">

    <div id="login-screen" class="fixed inset-0 z-50 flex items-center justify-center login-gradient px-4">
        <div class="max-w-md w-full glass p-10 rounded-[2.5rem] text-center fade-in shadow-2xl">
            <div class="mb-6 inline-flex items-center justify-center w-20 h-20 rounded-full bg-blue-600/20 border border-blue-500/30">
                <i class="fas fa-shield-halved text-4xl text-blue-500"></i>
            </div>
            <h1 class="text-4xl font-black italic tracking-tighter mb-2 italic">SG MÓVIL</h1>
            <p class="text-gray-400 text-xs uppercase tracking-[0.3em] mb-8 font-bold text-blue-400">Panel de Seguridad</p>
            
            <div class="relative mb-6">
                <i class="fas fa-lock absolute left-4 top-1/2 -translate-y-1/2 text-gray-500"></i>
                <input type="password" id="pass-input" placeholder="CONTRASEÑA" 
                    class="w-full bg-black/40 border border-gray-700 p-4 pl-12 rounded-2xl outline-none focus:border-blue-500 transition-all text-center tracking-[0.5em]">
            </div>
            
            <button onclick="verificarAcceso()" class="w-full bg-blue-600 py-4 rounded-2xl font-black tracking-widest btn-glow transition-all active:scale-95">
                ENTRAR AL SISTEMA
            </button>
            <p id="login-error" class="text-red-500 text-xs mt-4 opacity-0 transition-opacity">Contraseña incorrecta, intenta de nuevo.</p>
        </div>
    </div>

    <div id="admin-content" class="hidden min-h-screen p-4 md:p-8">
        <div class="max-w-6xl mx-auto space-y-6">
            
            <header class="flex flex-col md:flex-row justify-between items-center mb-10 gap-4">
                <div>
                    <h2 class="text-3xl font-black tracking-tighter italic">SG MÓVIL <span class="text-blue-500 text-sm not-italic font-bold ml-2">ADMIN PRO</span></h2>
                </div>
                <div class="flex gap-3">
                    <button onclick="cerrarSesion()" class="bg-gray-800 px-4 py-2 rounded-xl text-xs font-bold border border-gray-700 hover:bg-red-900/20 transition-all">
                        <i class="fas fa-power-off mr-2"></i>SALIR
                    </button>
                </div>
            </header>

            <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
                <div class="glass p-8 rounded-[2rem]">
                    <h3 class="text-lg font-bold mb-6 flex items-center gap-3 text-blue-400">
                        <i class="fas fa-file-invoice"></i> GESTIÓN DE ORDEN
                    </h3>
                    <div class="space-y-4">
                        <div class="grid grid-cols-2 gap-4">
                            <input type="text" id="admin-codigo" placeholder="CÓDIGO" class="bg-black/30 border border-gray-700 p-3 rounded-xl outline-none focus:border-blue-500 uppercase font-mono">
                            <input type="text" id="admin-modelo" placeholder="MODELO DEL EQUIPO" class="bg-black/30 border border-gray-700 p-3 rounded-xl outline-none focus:border-blue-500">
                        </div>
                        <select id="admin-estado" class="w-full bg-black/30 border border-gray-700 p-3 rounded-xl outline-none focus:border-blue-500">
                            <option>Recibido</option>
                            <option>En espera de piezas</option>
                            <option>En reparación</option>
                            <option>¡Listo para entrega!</option>
                        </select>
                        <div class="grid grid-cols-2 gap-4">
                            <input type="text" id="admin-entrega" placeholder="FECHA ENTREGA" class="bg-black/30 border border-gray-700 p-3 rounded-xl outline-none focus:border-blue-500">
                            <input type="number" id="admin-precio" placeholder="PRECIO COP" class="bg-black/30 border border-gray-700 p-3 rounded-xl outline-none focus:border-blue-500 text-green-400 font-bold">
                        </div>
                        <textarea id="admin-detalles" placeholder="OBSERVACIONES TÉCNICAS" class="w-full bg-black/30 border border-gray-700 p-3 rounded-xl outline-none focus:border-blue-500 h-24"></textarea>
                        <input type="text" id="admin-foto" placeholder="URL DE IMAGEN (IMGBB)" class="w-full bg-black/30 border border-gray-700 p-3 rounded-xl outline-none focus:border-blue-500 text-xs">
                        <div class="grid grid-cols-2 gap-4 pt-4">
                            <button onclick="guardarCambios()" id="btn-guardar" class="bg-blue-600 py-4 rounded-xl font-black btn-glow transition-all">GUARDAR</button>
                            <button onclick="imprimirTicket()" class="bg-gray-800 py-4 rounded-xl font-bold border border-gray-700 hover:bg-gray-700 transition-all">TICKET QR</button>
                        </div>
                    </div>
                </div>

                <div class="flex flex-col gap-6">
                    <div class="glass p-6 rounded-[2rem] border-green-500/20 relative overflow-hidden">
                        <div class="absolute top-0 right-0 p-4 opacity-10 text-6xl text-green-500"><i class="fas fa-wallet"></i></div>
                        <p class="text-gray-400 text-[10px] font-bold uppercase tracking-widest mb-1">Ganancia Real Acumulada</p>
                        <h2 id="ganancia-total" class="text-4xl font-black text-green-400">COP $ 0</h2>
                        <button onclick="cerrarCaja()" class="mt-4 text-[10px] bg-green-500/10 text-green-500 border border-green-500/20 px-4 py-1 rounded-full font-bold hover:bg-green-500 hover:text-white transition-all">CERRAR CAJA HOY</button>
                    </div>

                    <div class="glass p-6 rounded-[2rem] flex-1">
                        <div class="relative mb-6">
                            <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-gray-500"></i>
                            <input type="text" id="buscador" onkeyup="filtrarHistorial()" placeholder="Buscar orden o modelo..." class="w-full bg-black/30 border border-gray-700 p-3 pl-12 rounded-xl outline-none focus:border-blue-500 text-sm">
                        </div>
                        <div class="overflow-y-auto max-h-[300px] custom-scrollbar pr-2">
                            <table class="w-full text-left text-sm">
                                <tbody id="tabla-cuerpo"></tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>

            <div class="glass rounded-[2rem] overflow-hidden">
                <button onclick="togglePapelera()" class="w-full p-6 flex justify-between items-center hover:bg-white/5 transition-all">
                    <span class="font-bold text-gray-500 text-xs tracking-widest uppercase"><i class="fas fa-archive mr-3"></i>Archivo de Órdenes</span>
                    <i id="icono-papelera" class="fas fa-chevron-down text-gray-500"></i>
                </button>
                <div id="contenedor-papelera" class="hidden p-6 bg-black/20">
                    <table class="w-full text-xs text-left">
                        <tbody id="tabla-papelera"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        // CONFIGURACIÓN FIREBASE (La misma que ya usas)
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, setDoc, getDocs, collection, deleteDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBBpc9mNkqjx0IvUaGHlhqQhGZdUoNE1Kw",
            authDomain: "sg-movil-168dc.firebaseapp.com",
            projectId: "sg-movil-168dc",
            storageBucket: "sg-movil-168dc.firebasestorage.app",
            messagingSenderId: "701917698215",
            appId: "1:701917698215:web:f89880c11f91f6da38e382"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // --- SISTEMA DE ACCESO INTERACTIVO ---
        window.verificarAcceso = () => {
            const input = document.getElementById('pass-input').value;
            const errorMsg = document.getElementById('login-error');
            
            if (input === "SG2024") {
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('admin-content').classList.remove('hidden');
                cargarHistorial();
            } else {
                errorMsg.classList.remove('opacity-0');
                setTimeout(() => errorMsg.classList.add('opacity-0'), 2000);
            }
        };

        window.cerrarSesion = () => location.reload();

        // --- LÓGICA DE NEGOCIO ---
        window.cargarHistorial = async () => {
            const querySnapshot = await getDocs(collection(db, "reparaciones"));
            const tabla = document.getElementById('tabla-cuerpo');
            let total = 0;
            tabla.innerHTML = "";
            querySnapshot.forEach((docSnap) => {
                const data = docSnap.data();
                const p = parseInt(data.precio) || 0;
                if(data.estado === "¡Listo para entrega!") total += p;
                tabla.innerHTML += `
                    <tr class="border-b border-gray-800/50 hover:bg-white/5 transition-all">
                        <td class="py-4 font-mono font-bold text-blue-500">${docSnap.id}</td>
                        <td class="py-4">
                            <div class="font-bold">${data.modelo}</div>
                            <div class="text-[10px] ${data.estado === '¡Listo para entrega!' ? 'text-green-500' : 'text-blue-400'} font-bold uppercase tracking-tighter">${data.estado}</div>
                        </td>
                        <td class="py-4 font-bold text-green-400">$${p.toLocaleString('es-CO')}</td>
                        <td class="py-4 text-right">
                            <button onclick="cargarParaEditar('${docSnap.id}', '${data.modelo}', '${data.estado}', '${data.entrega}', '${p}', '${data.detalles}', '${data.foto_url}')" class="text-gray-400 hover:text-blue-500 p-2"><i class="fas fa-edit"></i></button>
                            <button onclick="archivarRegistro('${docSnap.id}')" class="text-gray-600 hover:text-orange-500 p-2"><i class="fas fa-archive"></i></button>
                        </td>
                    </tr>`;
            });
            document.getElementById('ganancia-total').innerText = "COP $ " + total.toLocaleString('es-CO');
            cargarPapelera();
        };

        window.guardarCambios = async () => {
            const cod = document.getElementById('admin-codigo').value.toUpperCase().trim();
            if(!cod) return;
            const btn = document.getElementById('btn-guardar');
            btn.innerText = "GUARDANDO...";
            await setDoc(doc(db, "reparaciones", cod), {
                modelo: document.getElementById('admin-modelo').value,
                estado: document.getElementById('admin-estado').value,
                entrega: document.getElementById('admin-entrega').value,
                precio: document.getElementById('admin-precio').value,
                detalles: document.getElementById('admin-detalles').value,
                foto_url: document.getElementById('admin-foto').value
            }, { merge: true });
            btn.innerText = "GUARDAR";
            cargarHistorial();
        };

        window.archivarRegistro = async (id) => {
            if(!confirm("¿Archivar orden?")) return;
            const docRef = doc(db, "reparaciones", id);
            const docSnap = await getDoc(docRef);
            await setDoc(doc(db, "archivados", id), docSnap.data());
            await deleteDoc(docRef);
            cargarHistorial();
        };

        window.cargarPapelera = async () => {
            const querySnapshot = await getDocs(collection(db, "archivados"));
            const tabla = document.getElementById('tabla-papelera');
            tabla.innerHTML = "";
            querySnapshot.forEach((docSnap) => {
                const data = docSnap.data();
                tabla.innerHTML += `
                    <tr class="border-b border-gray-800 opacity-60">
                        <td class="py-2 font-mono">${docSnap.id}</td>
                        <td class="py-2">${data.modelo}</td>
                        <td class="py-2 text-right">
                            <button onclick="restaurarRegistro('${docSnap.id}')" class="text-green-600 hover:text-green-400 mr-4"><i class="fas fa-undo-alt"></i></button>
                            <button onclick="eliminarDefinitivo('${docSnap.id}')" class="text-red-900 hover:text-red-600"><i class="fas fa-trash"></i></button>
                        </td>
                    </tr>`;
            });
        };

        window.restaurarRegistro = async (id) => {
            const docRef = doc(db, "archivados", id);
            const docSnap = await getDoc(docRef);
            await setDoc(doc(db, "reparaciones", id), docSnap.data());
            await deleteDoc(docRef);
            cargarHistorial();
        };

        window.eliminarDefinitivo = async (id) => {
            if(confirm("¿Eliminar PERMANENTEMENTE?")) {
                await deleteDoc(doc(db, "archivados", id));
                cargarPapelera();
            }
        };

        window.cargarParaEditar = (id, mod, est, ent, pre, det, fot) => {
            document.getElementById('admin-codigo').value = id;
            document.getElementById('admin-modelo').value = mod;
            document.getElementById('admin-estado').value = est;
            document.getElementById('admin-entrega').value = ent;
            document.getElementById('admin-precio').value = pre;
            document.getElementById('admin-detalles').value = (det === 'undefined') ? "" : det;
            document.getElementById('admin-foto').value = (fot === 'undefined') ? "" : fot;
            window.scrollTo({ top: 0, behavior: 'smooth' });
        };

        window.togglePapelera = () => {
            document.getElementById('contenedor-papelera').classList.toggle('hidden');
            document.getElementById('icono-papelera').classList.toggle('rotate-180');
        };

        window.imprimirTicket = () => {
            const cod = document.getElementById('admin-codigo').value.toUpperCase();
            const mod = document.getElementById('admin-modelo').value;
            const pre = parseInt(document.getElementById('admin-precio').value) || 0;
            const miLink = "https://samir4898.github.io/Consulta/"; 
            const win = window.open('', '', 'width=350,height=550');
            win.document.write(`<html><head><script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"><\/script><style>body{font-family:sans-serif;text-align:center;padding:15px; margin:0;} .ticket{width:240px;margin:auto;border:1px solid #000;padding:10px;} hr{border:none;border-top:1px dashed #000;margin:10px 0;} h1{margin:0;font-size:22px;}</style></head><body><div class="ticket"><h1>SG MÓVIL</h1><p style="font-size:10px;">Técnico Profesional</p><hr><p style="margin:0;font-size:12px;">ORDEN:</p><b style="font-size:28px;">${cod}</b><hr><div style="text-align:left;font-size:12px;"><p><b>EQUIPO:</b> ${mod}</p><p><b>VALOR:</b> $${pre.toLocaleString('es-CO')}</p></div><hr><div id="qrcode" style="display:flex;justify-content:center;margin:10px 0;"></div><p style="font-size:9px;">${miLink}</p><hr><b>¡GRACIAS!</b></div><script>new QRCode(document.getElementById("qrcode"),{text:"${miLink}",width:120,height:120}); setTimeout(()=>{window.print();window.close();},800);<\/script></body></html>`);
            win.document.close();
        };

        window.filtrarHistorial = () => {
            const b = document.getElementById('buscador').value.toLowerCase();
            document.querySelectorAll('.item-historial').forEach(f => f.style.display = f.innerText.toLowerCase().includes(b) ? '' : 'none');
        };

        window.cerrarCaja = () => alert("Total acumulado hoy: " + document.getElementById('ganancia-total').innerText);

        // Soporte para entrar con "Enter"
        document.getElementById('pass-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') verificarAcceso();
        });
    </script>
</body>
</html>
