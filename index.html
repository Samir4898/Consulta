<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SG MÓVIL - Centro de Soporte</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: radial-gradient(circle at top, #1a202c 0%, #07090e 100%); min-height: 100vh; color: white; }
        .tarjeta-cristal { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .paso-activo { color: #3b82f6; text-shadow: 0 0 10px rgba(59, 130, 246, 0.8); }
    </style>
</head>
<body>
    <div class="container mx-auto px-4 py-8 max-w-lg">
        <div class="text-center mb-10">
            <h1 class="text-5xl font-black italic tracking-tighter text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-cyan-300">SG MÓVIL</h1>
            <p class="mt-4 text-gray-400 text-xs uppercase tracking-widest font-bold">Seguimiento Técnico Digital</p>
        </div>

        <div class="tarjeta-cristal p-8 rounded-3xl mb-8 border-blue-500/20 shadow-[0_0_20px_rgba(59,130,246,0.1)]">
            <label class="block text-blue-400 text-xs font-bold mb-2 uppercase text-center tracking-widest">Código de Seguimiento</label>
            <input type="text" id="orderCode" placeholder="EJ: SG-100" class="w-full bg-black/40 p-4 rounded-xl border border-gray-700 text-white text-2xl font-mono text-center mb-4 uppercase focus:border-blue-500 outline-none transition-all">
            <button onclick="buscarReparacion()" id="btn-buscar" class="w-full bg-blue-600 hover:bg-blue-500 text-white py-4 rounded-xl font-black text-sm tracking-widest transition-all flex items-center justify-center gap-3">
                <i class="fas fa-microchip"></i> CONSULTAR ESTADO
            </button>
        </div>

        <div id="resultado" class="hidden space-y-6">
            <div class="tarjeta-cristal rounded-3xl overflow-hidden shadow-2xl">
                <div class="p-6 border-b border-gray-800 flex justify-between items-center bg-white/5">
                    <h3 id="res-modelo" class="text-2xl font-bold uppercase tracking-tight text-blue-100">---</h3>
                    <div id="res-badge" class="bg-blue-900/40 text-blue-400 px-3 py-1 rounded border border-blue-500/30 text-[10px] font-bold uppercase">ESTADO</div>
                </div>

                <div class="p-4 grid grid-cols-4 gap-2 text-center text-[8px] font-bold uppercase border-b border-gray-800">
                    <div id="paso1" class="text-gray-600"><i class="fas fa-inbox text-lg mb-1 block"></i>Recibido</div>
                    <div id="paso2" class="text-gray-600"><i class="fas fa-tools text-lg mb-1 block"></i>Diagnóstico</div>
                    <div id="paso3" class="text-gray-600"><i class="fas fa-atom text-lg mb-1 block"></i>En Proceso</div>
                    <div id="paso4" class="text-gray-600"><i class="fas fa-check-circle text-lg mb-1 block"></i>Listo</div>
                </div>

                <div class="p-6">
                    <div class="grid grid-cols-2 gap-4 mb-4">
                        <div class="p-3 bg-blue-500/10 border border-blue-500/20 rounded-xl text-center">
                            <p class="text-[9px] text-blue-400 uppercase font-bold mb-1">Entrega Estimada:</p>
                            <p id="res-entrega" class="text-xs font-bold text-white uppercase italic">---</p>
                        </div>
                        <div class="p-3 bg-green-500/10 border border-green-500/20 rounded-xl text-center">
                            <p class="text-[9px] text-green-400 uppercase font-bold mb-1">Costo Estimado:</p>
                            <p id="res-precio" class="text-lg font-black text-white">$ 0.00</p>
                        </div>
                    </div>

                    <div class="bg-gray-800/30 p-4 rounded-xl border border-gray-700 mb-6">
                        <p id="res-comentario" class="text-gray-400 italic text-sm text-center">---</p>
                    </div>

                    <div id="contenedor-foto" class="hidden mb-6 rounded-xl overflow-hidden border border-gray-700 shadow-lg">
                        <img id="res-foto" src="" class="w-full">
                    </div>

                    <button onclick="contactarWhatsApp()" class="w-full bg-green-600 hover:bg-green-500 text-white p-4 rounded-xl font-bold flex items-center justify-center gap-2 transition-all shadow-lg active:scale-95">
                        <i class="fab fa-whatsapp text-xl"></i> HABLAR CON EL TÉCNICO
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBBpc9mNkqjx0IvUaGHlhqQhGZdUoNE1Kw",
            authDomain: "sg-movil-168dc.firebaseapp.com",
            projectId: "sg-movil-168dc",
            storageBucket: "sg-movil-168dc.firebasestorage.app",
            messagingSenderId: "701917698215",
            appId: "1:701917698215:web:f89880c11f91f6da38e382"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        window.buscarReparacion = async () => {
            const codigo = document.getElementById('orderCode').value.trim().toUpperCase();
            if(!codigo) return;
            const btn = document.getElementById('btn-buscar');
            btn.innerHTML = '<i class="fas fa-circle-notch fa-spin"></i> ESCANEANDO...';
            
            try {
                const docSnap = await getDoc(doc(db, "reparaciones", codigo));
                if (docSnap.exists()) {
                    const data = docSnap.data();
                    document.getElementById('res-modelo').innerText = data.modelo;
                    document.getElementById('res-badge').innerText = data.estado;
                    document.getElementById('res-entrega').innerText = data.entrega || "POR CONFIRMAR";
                    document.getElementById('res-precio').innerText = data.precio ? '$ ' + data.precio : '$ 0.00';
                    document.getElementById('res-comentario').innerText = data.detalles || "Sin notas adicionales.";
                    
                    const estados = { "Recibido": 1, "En espera de piezas": 2, "En reparación": 3, "¡Listo para entrega!": 4 };
                    const nivel = estados[data.estado] || 1;
                    for(let i=1; i<=4; i++) { 
                        document.getElementById(`paso${i}`).className = i <= nivel ? 'paso-activo' : 'text-gray-600'; 
                    }

                    if(data.foto_url) { 
                        document.getElementById('res-foto').src = data.foto_url; 
                        document.getElementById('contenedor-foto').classList.remove('hidden'); 
                    } else {
                        document.getElementById('contenedor-foto').classList.add('hidden');
                    }
                    document.getElementById('resultado').classList.remove('hidden');
                } else { alert("⚠️ Código no encontrado. Verifique e intente de nuevo."); }
            } catch (e) { alert("❌ Error de conexión con la base de datos."); }
            btn.innerHTML = '<i class="fas fa-microchip"></i> CONSULTAR ESTADO';
        };

        window.contactarWhatsApp = () => {
            const tel = "573000000000"; // CAMBIA ESTE NÚMERO POR EL TUYO
            const cod = document.getElementById('orderCode').value;
            window.open(`https://wa.me/${tel}?text=Hola SG Móvil, mi código de reparación es ${cod}. Quisiera más información.`);
        };
    </script>
</body>
</html>
